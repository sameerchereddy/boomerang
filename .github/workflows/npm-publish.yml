name: Publish to npm

on:
  push:
    tags:
      - 'node-v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: boomerang-node/package-lock.json

      - name: Strip leading 'node-v' from tag to get release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#node-v}" >> $GITHUB_ENV

      - name: Set version
        working-directory: boomerang-node
        run: npm version ${{ env.RELEASE_VERSION }} --no-git-tag-version

      - name: Install dependencies
        working-directory: boomerang-node
        run: npm ci

      - name: Build
        working-directory: boomerang-node
        run: npm run build

      - name: Run unit tests
        working-directory: boomerang-node
        run: npm test

      - name: Publish to npm
        working-directory: boomerang-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
