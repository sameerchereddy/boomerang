name: Node.js SDK CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'boomerang-node/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'boomerang-node/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: boomerang-node/package-lock.json

      - name: Install dependencies
        working-directory: boomerang-node
        run: npm ci

      - name: Build
        working-directory: boomerang-node
        run: npm run build

      - name: Run unit tests
        working-directory: boomerang-node
        run: npm test
