name: .NET SDK

on:
  push:
    paths:
      - 'boomerang-dotnet/**'
      - '.github/workflows/dotnet-sdk.yml'
  pull_request:
    paths:
      - 'boomerang-dotnet/**'
      - '.github/workflows/dotnet-sdk.yml'
  workflow_dispatch:

concurrency:
  group: dotnet-sdk-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boomerang-dotnet

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('boomerang-dotnet/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Restore library and test projects only first — the sample consumes packages from ../artifacts.
      - name: Restore (libraries and tests)
        run: |
          dotnet restore src/Boomerang.Client/Boomerang.Client.csproj
          dotnet restore src/Boomerang.Client.AspNetCore/Boomerang.Client.AspNetCore.csproj
          dotnet restore tests/Boomerang.Client.Tests/Boomerang.Client.Tests.csproj

      - name: Build (libraries and tests)
        run: |
          dotnet build src/Boomerang.Client/Boomerang.Client.csproj -c Release --no-restore
          dotnet build src/Boomerang.Client.AspNetCore/Boomerang.Client.AspNetCore.csproj -c Release --no-restore
          dotnet build tests/Boomerang.Client.Tests/Boomerang.Client.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/Boomerang.Client.Tests/Boomerang.Client.Tests.csproj -c Release --no-build --verbosity normal

      - name: Pack (local feed for sample)
        run: |
          mkdir -p ../artifacts
          dotnet pack src/Boomerang.Client/Boomerang.Client.csproj -c Release -o ../artifacts --no-build
          dotnet pack src/Boomerang.Client.AspNetCore/Boomerang.Client.AspNetCore.csproj -c Release -o ../artifacts --no-build

      - name: Build full solution (includes sample via NuGet)
        run: dotnet build Boomerang.Client.sln -c Release

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: boomerang-nuget-packages
          path: artifacts/*.nupkg
          if-no-files-found: error

  integration-test:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: boomerang-dotnet

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('boomerang-dotnet/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Start Boomerang + Redis
        run: docker compose -f ../boomerang-standalone/docker-compose.yml up -d
        continue-on-error: true  # standalone not yet in repo; remove when added

      - name: Wait for Boomerang to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Boomerang is up"; exit 0
            fi
            sleep 2
          done
          echo "Boomerang did not start in time" && exit 1
        continue-on-error: true  # standalone not yet in repo; remove when added

      - name: Restore (tests)
        run: dotnet restore tests/Boomerang.Client.Tests/Boomerang.Client.Tests.csproj

      - name: Build (tests)
        run: dotnet build tests/Boomerang.Client.Tests/Boomerang.Client.Tests.csproj -c Release --no-restore

      - name: Run integration tests
        run: dotnet test tests/Boomerang.Client.Tests/Boomerang.Client.Tests.csproj -c Release --no-build --verbosity normal
        env:
          BOOMERANG_TEST_BASE_URL: http://localhost:8080/
          BOOMERANG_JWT_SECRET: ${{ secrets.BOOMERANG_JWT_SECRET }}
        continue-on-error: true  # standalone not yet in repo; remove when added
